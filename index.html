<!DOCTYPE html>
<html lang="gu">
<head>

    <title>JIGA BHAI - Gujarati Trader</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { 
            background: #000; 
            color: #fff; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1611974714024-4632832822a1?auto=format&fit=crop&w=800&q=80');
            background-size: cover; background-position: center;
        }
        .container { width: 90%; max-width: 400px; text-align: center; padding: 30px 20px; border-radius: 25px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.5); }
        .profile-img { width: 110px; height: 110px; border-radius: 50%; border: 3px solid #FFD700; margin-bottom: 15px; box-shadow: 0 0 20px #ffd70055; }
        h1 { font-size: 24px; color: #FFD700; letter-spacing: 1px; margin-bottom: 5px; }
        .tagline { font-size: 14px; margin-bottom: 25px; color: #ddd; }
        
        .btn { 
            display: flex; align-items: center; justify-content: center;
            width: 100%; padding: 16px; margin: 12px 0; border-radius: 15px; 
            text-decoration: none; font-weight: 700; font-size: 16px; transition: 0.3s;
        }
        .btn-telegram { background: #0088cc; color: #fff; box-shadow: 0 5px 15px rgba(0,136,204,0.3); }
        .btn-bot { background: transparent; color: #FFD700; border: 2px solid #FFD700; }
        .btn:active { transform: scale(0.96); }

        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 25px; }
        .stat-box { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; font-size: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .gold { color: #FFD700; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
